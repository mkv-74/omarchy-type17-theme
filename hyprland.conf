# ────────────────────────────────────────────────────────────
# Omarchy Theme for Hyprland
# ────────────────────────────────────────────────────────────

# Border

$activeBorderColor = rgb(95abb6)

general {
    col.active_border = $activeBorderColor
    border_size = 2
    gaps_in = 2
    gaps_out = 4
}

group {
    col.border_active = $activeBorderColor
}

# Animations

animations {
    enabled = yes

    bezier = clean, 0.40, 0.00, 0.20, 1.00

    animation = windows,     1, 3, clean
    animation = windowsIn,   1, 2, clean
    animation = windowsOut,  1, 2, clean
    animation = windowsMove, 1, 3, clean

    animation = fade,        1, 2, clean
    animation = fadeIn,      1, 1, clean
    animation = fadeOut,     1, 1, clean

    animation = layers,      1, 2, clean
    animation = layersIn,    1, 2, clean
    animation = layersOut,   1, 1, clean

    animation = workspaces,  1, 3, clean
}

# Decoration

decoration {
    rounding = 6
    shadow {
        enabled = false
        range = 15
        render_power = 5
        offset = 0 0
    } 
    
blur {
    enabled = true
    size = 2          
    passes = 4
    contrast = 1.1
    brightness = 1.1
    vibrancy = 0.2    
    vibrancy_darkness = 0.2
    noise = 0.03      
    ignore_opacity = true
    new_optimizations = on
}
    active_opacity = 0.93
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0 
}

# Layer Rules

layerrule = blur, walker
layerrule = ignorezero, walker
layerrule = blur, waybar
layerrule = blur, notifications
layerrule = ignorezero, notifications
layerrule = blur, vicinae
layerrule = blur, swayosd
layerrule = ignorealpha 0.1, waybar
layerrule = ignorealpha 0.1, vicinae
